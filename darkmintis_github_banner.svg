<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Glow filters -->
    <filter id="glow_strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow_soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow_icon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow_bg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Subtle gradient for depth -->
    <radialGradient id="center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="text_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>

    <linearGradient id="text_grad_glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#080808"/>

  <!-- Subtle center depth -->
  <rect width="1584" height="396" fill="url(#center_glow)"/>

  <!-- Ambient glow behind text — pulsing -->
  <ellipse cx="792" cy="198" rx="500" ry="160" fill="#ffffff" opacity="0" filter="url(#glow_bg)">
    <animate attributeName="opacity" values="0.012;0.028;0.012" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ══ ICONS LEFT ══ -->

  <!-- Code icon </> -->
  <g opacity="0" filter="url(#glow_icon)">
    <animate attributeName="opacity" values="0;0.18;0.18;0.18;0" dur="6s" begin="0.5s" repeatCount="indefinite"/>
    <text x="110" y="155" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- Git branch icon -->
  <g opacity="0.14" transform="translate(60, 220)">
    <!-- vertical line -->
    <line x1="20" y1="0" x2="20" y2="60" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- branch line -->
    <line x1="20" y1="20" x2="55" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- top dot -->
    <circle cx="20" cy="0" r="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <!-- bottom dot -->
    <circle cx="20" cy="60" r="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <!-- branch dot -->
    <circle cx="60" cy="54" r="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <animate attributeName="opacity" values="0.14;0.24;0.14" dur="4s" begin="1s" repeatCount="indefinite"/>
  </g>

  <!-- Flutter logo shape (stylized F) -->
  <g transform="translate(180, 260)" opacity="0.12">
    <polygon points="0,0 42,0 12,30" fill="#ffffff"/>
    <polygon points="0,36 42,36 12,66" fill="#ffffff" opacity="0.7"/>
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="5s" begin="0.8s" repeatCount="indefinite"/>
  </g>

  <!-- Lock / shield icon -->
  <g transform="translate(230, 120)" opacity="0.13">
    <rect x="0" y="22" width="44" height="34" rx="4" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <path d="M8 22 V14 A14 14 0 0 1 36 14 V22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="22" cy="36" r="4" fill="#ffffff"/>
    <animate attributeName="opacity" values="0.13;0.22;0.13" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- Small scattered dots left -->
  <g fill="#ffffff">
    <circle cx="50" cy="80" r="2" opacity="0.15"/>
    <circle cx="80" cy="300" r="1.5" opacity="0.1"/>
    <circle cx="155" cy="340" r="2" opacity="0.12"/>
    <circle cx="200" cy="60" r="1.5" opacity="0.08"/>
    <circle cx="260" cy="310" r="1.5" opacity="0.1"/>
    <circle cx="310" cy="80" r="2" opacity="0.08"/>
    <circle cx="320" cy="280" r="1.5" opacity="0.12"/>
  </g>

  <!-- ══ ICONS RIGHT ══ -->

  <!-- Rocket icon -->
  <g transform="translate(1370, 100)" opacity="0.13">
    <path d="M20 60 C20 60 5 45 5 25 C5 10 15 0 30 0 C45 0 55 10 55 25 C55 45 40 60 40 60 Z" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="30" cy="22" r="7" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <path d="M15 55 L5 70 L20 65 Z" fill="#ffffff" opacity="0.5"/>
    <path d="M45 55 L55 70 L40 65 Z" fill="#ffffff" opacity="0.5"/>
    <animate attributeName="opacity" values="0.13;0.22;0.13" dur="5s" begin="0.3s" repeatCount="indefinite"/>
  </g>

  <!-- Layers icon -->
  <g transform="translate(1450, 220)" opacity="0.13">
    <polygon points="30,0 60,14 30,28 0,14" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    <polyline points="0,24 30,38 60,24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,34 30,48 60,34" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <animate attributeName="opacity" values="0.13;0.24;0.13" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </g>

  <!-- Phone / mobile icon -->
  <g transform="translate(1280, 260)" opacity="0.12">
    <rect x="0" y="0" width="36" height="60" rx="5" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="12" y1="52" x2="24" y2="52" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="4.8s" begin="2.2s" repeatCount="indefinite"/>
  </g>

  <!-- Network nodes right -->
  <g opacity="0.11">
    <line x1="1200" y1="80" x2="1260" y2="130" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="1260" y1="130" x2="1240" y2="200" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="1200" y1="80" x2="1240" y2="200" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="1200" cy="80" r="5" fill="#ffffff"/>
    <circle cx="1260" cy="130" r="4" fill="#ffffff"/>
    <circle cx="1240" cy="200" r="5" fill="#ffffff"/>
    <animate attributeName="opacity" values="0.11;0.2;0.11" dur="5.5s" begin="0.7s" repeatCount="indefinite"/>
  </g>

  <!-- Small dots right -->
  <g fill="#ffffff">
    <circle cx="1320" cy="70" r="2" opacity="0.12"/>
    <circle cx="1400" cy="340" r="1.5" opacity="0.1"/>
    <circle cx="1480" cy="80" r="2" opacity="0.08"/>
    <circle cx="1530" cy="300" r="1.5" opacity="0.12"/>
    <circle cx="1560" cy="150" r="2" opacity="0.09"/>
    <circle cx="1180" cy="300" r="1.5" opacity="0.1"/>
    <circle cx="1170" cy="120" r="2" opacity="0.08"/>
  </g>

  <!-- ══ MAIN TEXT ══ -->

  <!-- Shadow layer — deepens the 3D feel -->
  <text
    x="792" y="250"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="178"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="12"
    fill="#000000"
    opacity="0.6"
    transform="translate(4,6)"
  >DARKMINTIS</text>

  <!-- Base text layer -->
  <text
    x="792" y="250"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="178"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="12"
    fill="url(#text_grad)"
  >DARKMINTIS</text>

  <!-- Glow layer — pulses -->
  <text
    x="792" y="250"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="178"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="12"
    fill="url(#text_grad_glow)"
    filter="url(#glow_strong)"
    opacity="0"
  >DARKMINTIS
    <animate attributeName="opacity" values="0;0.35;0.55;0.35;0" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Sharp crisp top layer — always on -->
  <text
    x="792" y="250"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="178"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="12"
    fill="#ffffff"
    opacity="0.92"
  >DARKMINTIS</text>

  <!-- MINTIS glow highlight — extra glow on MINTIS only -->
  <text
    x="792" y="250"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="178"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="12"
    fill="#ffffff"
    filter="url(#glow_soft)"
    opacity="0"
  >DARKMINTIS
    <animate attributeName="opacity" values="0;0.15;0.4;0.6;0.4;0.15;0" dur="3s" begin="0.1s" repeatCount="indefinite"/>
  </text>

  <!-- Thin horizontal rule lines -->
  <line x1="80" y1="290" x2="540" y2="290" stroke="#ffffff" stroke-width="0.6" opacity="0.08"/>
  <line x1="1044" y1="290" x2="1500" y2="290" stroke="#ffffff" stroke-width="0.6" opacity="0.08"/>

</svg>
